<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Приложение на Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Оставляем те же стили, что были выше */
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .badge { background: #ffd700; padding: 3px 8px; border-radius: 12px; font-size: 11px; margin-right: 5px; font-weight: bold; }
        .leader-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; }
        .leader-score { margin-left: auto; font-weight: bold; }
        /* ... твои остальные стили ... */
    </style>
</head>
<body>

    <div id="authSection" class="container">
        <button id="loginBtn">Войти через Google</button>
        <div id="userInfo" style="display: none;">
            <img id="userPhoto" style="width:40px; border-radius:50%">
            <b id="userName"></b>
            <div id="userBadges"></div>
            <button id="logoutBtn">Выйти</button>
        </div>
    </div>

    <div class="container">
        <h3>🏆 Топ студентов</h3>
        <div id="leaderList">Загрузка...</div>
    </div>

    <div id="messageForm" class="container" style="display: none;">
        <input type="text" id="content" placeholder="Что нового?">
        <button id="mainBtn">Опубликовать</button>
    </div>

    <div id="feed"></div>

    <script>
        // ТВОИ ДАННЫЕ ИЗ SUPABASE
        const SUPABASE_URL = 'https://твой-проект.supabase.co';
        const SUPABASE_KEY = 'твой-анон-ключ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- АВТОРИЗАЦИЯ ---
        async function signIn() {
            await supabase.auth.signInWithOAuth({ provider: 'google' });
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                showUI(user);
                updateLeaderboard();
                loadPosts();
                checkAchievements(user);
            }
        }

        function showUI(user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('messageForm').style.display = 'block';
            document.getElementById('userName').innerText = user.user_metadata.full_name;
            document.getElementById('userPhoto').src = user.user_metadata.avatar_url;
        }

        // --- ЛОГИКА ДОСТИЖЕНИЙ ---
        async function checkAchievements(user) {
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            
            let badges = profile?.badges || [];
            const hour = new Date().getHours();
            
            if (hour < 8 && !badges.includes("🌅 Ранняя пташка")) {
                badges.push("🌅 Ранняя пташка");
            }
            if (profile?.msg_count >= 20 && !badges.includes("🔥 Активист")) {
                badges.push("🔥 Активист");
            }

            await supabase.from('profiles').upsert({ 
                id: user.id, 
                badges: badges,
                name: user.user_metadata.full_name,
                photo_url: user.user_metadata.avatar_url
            });

            document.getElementById('userBadges').innerHTML = badges.map(b => `<span class="badge">${b}</span>`).join('');
        }

        // --- РЕЙТИНГ ---
        async function updateLeaderboard() {
            const { data } = await supabase.from('profiles').select('*').order('msg_count', { ascending: false }).limit(5);
            const list = document.getElementById('leaderList');
            list.innerHTML = data.map((u, i) => `
                <div class="leader-item">
                    <span>#${i+1}</span>
                    <b>${u.name}</b>
                    <span class="leader-score">${u.msg_count} ✉️</span>
                </div>
            `).join('');
        }

        // --- ПОСТЫ ---
        document.getElementById('mainBtn').onclick = async () => {
            const content = document.getElementById('content').value;
            const { data: { user } } = await supabase.auth.getUser();

            // Создаем пост
            await supabase.from('posts').insert({
                user_id: user.id,
                name: user.user_metadata.full_name,
                photo_url: user.user_metadata.avatar_url,
                content: content
            });

            // Обновляем счетчик сообщений
            const { data: profile } = await supabase.from('profiles').select('msg_count').eq('id', user.id).single();
            await supabase.from('profiles').update({ msg_count: (profile?.msg_count || 0) + 1 }).eq('id', user.id);

            location.reload(); // Для простоты обновим страницу
        };

        document.getElementById('loginBtn').onclick = signIn;
        checkUser();
    </script>
</body>
</html>
