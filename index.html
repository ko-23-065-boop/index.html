<!DOCTYPE html>
<html>
<head>
  <title>ToDo Firebase</title>
</head>
<body>

  <h2>Список задач</h2>

  <input type="text" id="task" placeholder="Введите задачу">
  <button onclick="addTask()">Добавить</button>

  <div id="tasks"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      updateDoc,
      doc,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔴 ВСТАВЬ СВОЙ config
    const firebaseConfig = {
      apiKey: "ТВОЙ_KEY",
      authDomain: "ТВОЙ_DOMAIN",
      projectId: "ТВОЙ_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tasksRef = collection(db, "tasks");

    // ✅ ФУНКЦИЯ 1 — добавление задачи
    window.addTask = async () => {
      const task = document.getElementById("task").value;

      await addDoc(tasksRef, {
        text: task,
        done: false,
        timestamp: Date.now()
      });
    };

    // ✅ ФУНКЦИЯ 2 — изменение статуса (выполнено/нет)
    window.toggleTask = async (id, currentStatus) => {
      const taskRef = doc(db, "tasks", id);

      await updateDoc(taskRef, {
        done: !currentStatus
      });
    };

    // 🔄 Реалтайм
    const q = query(tasksRef, orderBy("timestamp", "desc"));

    onSnapshot(q, (snapshot) => {
      const tasksDiv = document.getElementById("tasks");
      tasksDiv.innerHTML = "";

      snapshot.forEach((docItem) => {
        const data = docItem.data();

        tasksDiv.innerHTML += `
          <div>
            <p>${data.text}</p>
            <p>${data.done ? "✅ Выполнено" : "❌ Не выполнено"}</p>
            <button onclick="toggleTask('${docItem.id}', ${data.done})">
              Изменить статус
            </button>
            <hr>
          </div>
        `;
      });
    });
  </script>

</body>
</html>
