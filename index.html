<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SB_URL = "https://bhcsfyysbgkhlixrxebl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoY3NmeXlzYmdraGxpeHJ4ZWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTM4NTQsImV4cCI6MjA5MDc2OTg1NH0.Dmv8thqTnvqnbqDYGdzufMyNrRVEo_SLIFKPrMdTz_I";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // 1. ВХОД ПО ПОЧТЕ (БЕЗ ПАРОЛЯ)
    async function login() {
        const email = prompt("Введите ваш Email для входа:");
        if (!email) return;
        
        const { error } = await supabaseClient.auth.signInWithOtp({ 
            email,
            options: {
                emailRedirectTo: window.location.href // Вернуться на эту же страницу после клика в письме
            }
        });

        if (error) alert("Ошибка: " + error.message);
        else alert("Письмо отправлено! Проверьте почту и кликните по ссылке для входа.");
    }

    // 2. СИНХРОНИЗАЦИЯ ПРОФИЛЯ И ЗНАЧКОВ
    async function syncProfile(user) {
        let { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
        
        // Если профиля еще нет в таблице — создаем
        if (!profile) {
            const { data, error } = await supabaseClient.from('profiles').upsert({
                id: user.id,
                full_name: user.email.split('@')[0], // Вместо имени берем часть почты
                avatar_url: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + user.id,
                msg_count: 0,
                badges: []
            }).select().single();
            profile = data;
        }

        // ПРОВЕРКА ДОСТИЖЕНИЙ
        let badges = profile.badges || [];
        const hour = new Date().getHours();

        if (hour < 8 && !badges.includes("🌅 Ранняя пташка")) badges.push("🌅 Ранняя пташка");
        if (profile.msg_count >= 20 && !badges.includes("🔥 Активист")) badges.push("🔥 Активист");

        // Если значки обновились — сохраняем в базу
        if (badges.length !== (profile.badges || []).length) {
            await supabaseClient.from('profiles').update({ badges }).eq('id', user.id);
        }

        // Отрисовка в профиле
        document.getElementById('userBadges').innerHTML = badges.map(b => `<span class="badge">${b}</span>`).join('');
        document.getElementById('userName').innerText = profile.full_name;
        document.getElementById('userPhoto').src = profile.avatar_url;
    }

    // 3. ЗАГРУЗКА ТОП-5
    async function loadTop() {
        const { data, error } = await supabaseClient
            .from('profiles')
            .select('full_name, msg_count')
            .order('msg_count', { ascending: false })
            .limit(5);

        const list = document.getElementById('leaderList');
        if (data && data.length > 0) {
            list.innerHTML = data.map((u, i) => `
                <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;">
                    <span>#${i+1} ${u.full_name}</span>
                    <b>${u.msg_count} сообщ.</b>
                </div>
            `).join('');
        } else {
            list.innerText = "Рейтинг пока пуст. Будьте первым!";
        }
    }

    // 4. ОТПРАВКА СООБЩЕНИЯ
    document.getElementById('mainBtn').onclick = async () => {
        const content = document.getElementById('content').value;
        if (!content) return;

        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return alert("Сначала войдите!");

        // Сохраняем пост
        await supabaseClient.from('requests').insert({
            user_id: user.id,
            name: user.email.split('@')[0],
            text: content
        });

        // Обновляем счетчик сообщений в профиле
        const { data: p } = await supabaseClient.from('profiles').select('msg_count').eq('id', user.id).single();
        await supabaseClient.from('profiles').update({ msg_count: (p?.msg_count || 0) + 1 }).eq('id', user.id);

        document.getElementById('content').value = "";
        await syncProfile(user);
        loadTop();
    };

    // СЛУШАТЕЛЬ ВХОДА
    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messageForm').style.display = 'block';
            syncProfile(session.user);
        }
        loadTop();
    });

    document.getElementById('loginBtn').onclick = login;
    document.getElementById('loginBtn').innerText = "Войти через почту";
</script>
