<!DOCTYPE html>
<html>
<head>
  <title>Комментарии</title>
</head>
<body>

  <h2>Комментарии</h2>

  <input type="text" id="comment" placeholder="Введите комментарий">
  <button onclick="addComment()">Отправить</button>

  <div id="comments"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      updateDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "ТВОЙ_KEY",
      authDomain: "ТВОЙ_DOMAIN",
      projectId: "ТВОЙ_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const commentsRef = collection(db, "comments");

    // ✅ ФУНКЦИЯ 1 — добавить комментарий
    window.addComment = async () => {
      const text = document.getElementById("comment").value;

      await addDoc(commentsRef, {
        text: text
      });
    };

    // ✅ ФУНКЦИЯ 2 — редактировать комментарий
    window.editComment = async (id) => {
      const newText = prompt("Введите новый текст");

      const commentRef = doc(db, "comments", id);

      await updateDoc(commentRef, {
        text: newText
      });
    };

    // 🔄 Реалтайм
    onSnapshot(commentsRef, (snapshot) => {
      const div = document.getElementById("comments");
      div.innerHTML = "";

      snapshot.forEach((docItem) => {
        const data = docItem.data();

        div.innerHTML += `
          <div>
            <p>${data.text}</p>
            <button onclick="editComment('${docItem.id}')">
              Редактировать
            </button>
            <hr>
          </div>
        `;
      });
    });
  </script>

</body>
</html>
